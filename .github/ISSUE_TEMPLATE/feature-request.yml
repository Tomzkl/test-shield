---
name: 💡 功能建议
description: 提议新功能、新语言支持、或改进
title: "[Feature] 简短描述"
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: 涉及方面
      options:
        - 新语言支持（TypeScript / Go / Rust）
        - 新测试框架支持
        - analyze.py 功能增强
        - Claude Code 工作流改进
        - 文档改进
        - CI/CD 集成
        - 其他
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 这个功能解决什么问题？
      description: 描述你遇到的痛点——不是你想要什么功能，而是你想要解决什么问题
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你的方案
      description: 你希望 Test Shield 怎么做？
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 有没有已有的工具或方法可以解决这个问题？为什么它们不够好？
